version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ghost_investor_ai_db
    environment:
      POSTGRES_DB: ghost_investor_ai
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ghost_investor_ai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ghost_investor_ai_api
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/ghost_investor_ai
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/1
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m uvicorn src.ghost_investor_ai.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: ghost_investor_ai_celery
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/ghost_investor_ai
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A src.ghost_investor_ai.services.batch_jobs worker --loglevel=info

volumes:
  postgres_data:
